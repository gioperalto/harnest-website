<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F7FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CAF0F8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A261;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E76F51;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0077B6" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="2" fill="#0077B6"/>
    <circle cx="200" cy="100" r="2" fill="#0077B6"/>
    <circle cx="300" cy="100" r="2" fill="#0077B6"/>
    <circle cx="400" cy="100" r="2" fill="#0077B6"/>
    <circle cx="500" cy="100" r="2" fill="#0077B6"/>
    <circle cx="600" cy="100" r="2" fill="#0077B6"/>
    <circle cx="700" cy="100" r="2" fill="#0077B6"/>
    <circle cx="100" cy="200" r="2" fill="#0077B6"/>
    <circle cx="200" cy="200" r="2" fill="#0077B6"/>
    <circle cx="300" cy="200" r="2" fill="#0077B6"/>
    <circle cx="400" cy="200" r="2" fill="#0077B6"/>
    <circle cx="500" cy="200" r="2" fill="#0077B6"/>
    <circle cx="600" cy="200" r="2" fill="#0077B6"/>
    <circle cx="700" cy="200" r="2" fill="#0077B6"/>
    <circle cx="100" cy="300" r="2" fill="#0077B6"/>
    <circle cx="200" cy="300" r="2" fill="#0077B6"/>
    <circle cx="300" cy="300" r="2" fill="#0077B6"/>
    <circle cx="400" cy="300" r="2" fill="#0077B6"/>
    <circle cx="500" cy="300" r="2" fill="#0077B6"/>
    <circle cx="600" cy="300" r="2" fill="#0077B6"/>
    <circle cx="700" cy="300" r="2" fill="#0077B6"/>
    <circle cx="100" cy="400" r="2" fill="#0077B6"/>
    <circle cx="200" cy="400" r="2" fill="#0077B6"/>
    <circle cx="300" cy="400" r="2" fill="#0077B6"/>
    <circle cx="400" cy="400" r="2" fill="#0077B6"/>
    <circle cx="500" cy="400" r="2" fill="#0077B6"/>
    <circle cx="600" cy="400" r="2" fill="#0077B6"/>
    <circle cx="700" cy="400" r="2" fill="#0077B6"/>
    <circle cx="100" cy="500" r="2" fill="#0077B6"/>
    <circle cx="200" cy="500" r="2" fill="#0077B6"/>
    <circle cx="300" cy="500" r="2" fill="#0077B6"/>
    <circle cx="400" cy="500" r="2" fill="#0077B6"/>
    <circle cx="500" cy="500" r="2" fill="#0077B6"/>
    <circle cx="600" cy="500" r="2" fill="#0077B6"/>
    <circle cx="700" cy="500" r="2" fill="#0077B6"/>
  </g>

  <!-- Branch / tree structure (network) -->
  <!-- Main trunk -->
  <line x1="400" y1="520" x2="400" y2="340" stroke="url(#branchGrad)" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="400" y1="380" x2="250" y2="260" stroke="url(#branchGrad)" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="400" y1="380" x2="550" y2="260" stroke="url(#branchGrad)" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <!-- Sub branches left -->
  <line x1="250" y1="260" x2="170" y2="180" stroke="#00B4D8" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="250" y1="260" x2="300" y2="175" stroke="#00B4D8" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <!-- Sub branches right -->
  <line x1="550" y1="260" x2="500" y2="175" stroke="#00B4D8" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="550" y1="260" x2="630" y2="180" stroke="#00B4D8" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Nest — geometric bowl shape using arcs -->
  <!-- Outer nest structure - arc segments suggesting woven twigs -->
  <g filter="url(#softShadow)">
    <!-- Nest bowl background -->
    <ellipse cx="400" cy="430" rx="100" ry="40" fill="#E76F51" opacity="0.3"/>
    <!-- Twig lines - horizontal arcs -->
    <path d="M 308 425 Q 400 445 492 425" stroke="#F4A261" stroke-width="3.5" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M 315 415 Q 400 435 485 415" stroke="#E76F51" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M 325 405 Q 400 420 475 405" stroke="#F4A261" stroke-width="2.5" fill="none" opacity="0.75" stroke-linecap="round"/>
    <path d="M 338 397 Q 400 408 462 397" stroke="#E76F51" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
    <!-- Diagonal twig accents -->
    <line x1="310" y1="420" x2="330" y2="395" stroke="#F4A261" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="490" y1="420" x2="470" y2="395" stroke="#F4A261" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="350" y1="430" x2="340" y2="400" stroke="#E76F51" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="450" y1="430" x2="460" y2="400" stroke="#E76F51" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Nest interior -->
    <ellipse cx="400" cy="400" rx="58" ry="20" fill="#F4A261" opacity="0.2"/>
  </g>

  <!-- Eggs in nest -->
  <ellipse cx="380" cy="398" rx="16" ry="12" fill="#CAF0F8" stroke="#0077B6" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="405" cy="396" rx="16" ry="12" fill="#ADE8F4" stroke="#0077B6" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="428" cy="399" rx="14" ry="11" fill="#90E0EF" stroke="#0077B6" stroke-width="1.5" opacity="0.9"/>
  <!-- Egg shine -->
  <ellipse cx="376" cy="393" rx="5" ry="3" fill="white" opacity="0.5" transform="rotate(-20 376 393)"/>
  <ellipse cx="401" cy="391" rx="5" ry="3" fill="white" opacity="0.5" transform="rotate(-20 401 391)"/>

  <!-- Agent nodes at branch tips (glowing circles) -->
  <circle cx="170" cy="175" r="18" fill="#0077B6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="170" cy="175" r="12" fill="#00B4D8"/>
  <circle cx="170" cy="175" r="5" fill="white" opacity="0.8"/>

  <circle cx="300" cy="170" r="18" fill="#0077B6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="300" cy="170" r="12" fill="#00B4D8"/>
  <circle cx="300" cy="170" r="5" fill="white" opacity="0.8"/>

  <circle cx="500" cy="170" r="18" fill="#0077B6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="500" cy="170" r="12" fill="#00B4D8"/>
  <circle cx="500" cy="170" r="5" fill="white" opacity="0.8"/>

  <circle cx="630" cy="175" r="18" fill="#0077B6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="630" cy="175" r="12" fill="#00B4D8"/>
  <circle cx="630" cy="175" r="5" fill="white" opacity="0.8"/>

  <!-- Junction node -->
  <circle cx="250" cy="255" r="14" fill="#F4A261" opacity="0.9"/>
  <circle cx="250" cy="255" r="8" fill="#E76F51"/>

  <circle cx="550" cy="255" r="14" fill="#F4A261" opacity="0.9"/>
  <circle cx="550" cy="255" r="8" fill="#E76F51"/>

  <!-- Central hub at trunk top -->
  <circle cx="400" cy="338" r="20" fill="#023E8A" opacity="0.9" filter="url(#glow)"/>
  <circle cx="400" cy="338" r="13" fill="#0077B6"/>
  <circle cx="400" cy="338" r="6" fill="#ADE8F4"/>

  <!-- Floating particles -->
  <circle cx="150" cy="350" r="3" fill="#F4A261" opacity="0.5"/>
  <circle cx="650" cy="320" r="3" fill="#F4A261" opacity="0.5"/>
  <circle cx="120" cy="450" r="2" fill="#00B4D8" opacity="0.4"/>
  <circle cx="680" cy="460" r="2" fill="#00B4D8" opacity="0.4"/>
  <circle cx="700" cy="130" r="3" fill="#ADE8F4" opacity="0.5"/>
  <circle cx="100" cy="140" r="2.5" fill="#ADE8F4" opacity="0.4"/>
</svg>
