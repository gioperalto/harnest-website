<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="wpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90E0EF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wpGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A261"/>
      <stop offset="100%" style="stop-color:#E76F51"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="600" height="400" rx="16" fill="url(#wpBg)"/>

  <!-- Creative flow wave accent -->
  <path d="M 0 250 Q 150 200 300 250 Q 450 300 600 250 L 600 400 L 0 400 Z" fill="#023E8A" opacity="0.2"/>
  <path d="M 0 280 Q 150 240 300 280 Q 450 320 600 280 L 600 400 L 0 400 Z" fill="#023E8A" opacity="0.15"/>

  <!-- Creative flow layout — horizontal with connections -->
  <!-- Strategist (left) -->
  <circle cx="100" cy="160" r="32" fill="url(#wpGold)" opacity="0.95" filter="url(#glow3)"/>
  <circle cx="100" cy="160" r="20" fill="#E76F51"/>
  <text x="100" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">STRAT</text>
  <text x="100" y="167" text-anchor="middle" font-family="monospace" font-size="7" fill="white" opacity="0.8">EGIST</text>

  <!-- Arrow to Artist -->
  <line x1="132" y1="160" x2="188" y2="160" stroke="white" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="185,155 195,160 185,165" fill="white" opacity="0.6"/>

  <!-- Artist (center-left) -->
  <circle cx="220" cy="160" r="28" fill="white" opacity="0.2"/>
  <circle cx="220" cy="160" r="28" fill="#ADE8F4" opacity="0.3"/>
  <circle cx="220" cy="160" r="18" fill="#0077B6"/>
  <!-- Palette dots on artist -->
  <circle cx="213" cy="154" r="4" fill="#F4A261" opacity="0.9"/>
  <circle cx="222" cy="150" r="4" fill="#ADE8F4" opacity="0.9"/>
  <circle cx="230" cy="155" r="4" fill="#00B4D8" opacity="0.9"/>
  <circle cx="225" cy="164" r="4" fill="white" opacity="0.6"/>

  <!-- Arrow to Builder -->
  <line x1="248" y1="160" x2="332" y2="160" stroke="white" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="329,155 339,160 329,165" fill="white" opacity="0.6"/>

  <!-- Builder (center-right) -->
  <rect x="340" y="132" width="80" height="56" rx="12" fill="#023E8A" opacity="0.85"/>
  <!-- Code lines inside builder -->
  <line x1="355" y1="150" x2="405" y2="150" stroke="#ADE8F4" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="355" y1="160" x2="395" y2="160" stroke="#00B4D8" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="355" y1="170" x2="400" y2="170" stroke="#ADE8F4" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="355" y1="180" x2="385" y2="180" stroke="#00B4D8" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Arrow to UX Tester -->
  <line x1="420" y1="160" x2="468" y2="160" stroke="white" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="465,155 475,160 465,165" fill="white" opacity="0.6"/>

  <!-- UX Tester (right) -->
  <circle cx="500" cy="160" r="30" fill="url(#wpGold)" opacity="0.9" filter="url(#glow3)"/>
  <circle cx="500" cy="160" r="18" fill="#E76F51"/>
  <!-- Checkmark in UX tester -->
  <polyline points="489,160 497,168 514,150" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>

  <!-- Labels below nodes -->
  <text x="100" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Strategist</text>
  <text x="220" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Artist</text>
  <text x="380" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Builder</text>
  <text x="500" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">UX Tester</text>

  <!-- Brief and assets flow indicators -->
  <text x="160" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0.5">brief</text>
  <text x="290" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0.5">assets</text>
  <text x="447" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0.5">review</text>

  <!-- Decorative corner elements -->
  <circle cx="50" cy="50" r="20" fill="#F4A261" opacity="0.1"/>
  <circle cx="550" cy="50" r="20" fill="#ADE8F4" opacity="0.1"/>
  <circle cx="50" cy="350" r="15" fill="#ADE8F4" opacity="0.08"/>
  <circle cx="550" cy="350" r="15" fill="#F4A261" opacity="0.08"/>
</svg>
