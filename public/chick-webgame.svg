<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="wgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0B33;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B1A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FBE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wgNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8B4FE"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
    <filter id="wgGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="600" height="400" rx="16" fill="url(#wgBg)"/>

  <!-- Pixel scanline effect (subtle) -->
  <g opacity="0.04" fill="#D8B4FE">
    <rect x="0" y="40" width="600" height="2"/>
    <rect x="0" y="80" width="600" height="2"/>
    <rect x="0" y="120" width="600" height="2"/>
    <rect x="0" y="160" width="600" height="2"/>
    <rect x="0" y="200" width="600" height="2"/>
    <rect x="0" y="240" width="600" height="2"/>
    <rect x="0" y="280" width="600" height="2"/>
    <rect x="0" y="320" width="600" height="2"/>
    <rect x="0" y="360" width="600" height="2"/>
  </g>

  <!-- Game screen in background (decorative) -->
  <rect x="380" y="50" width="180" height="120" rx="8" fill="#1A0B33" opacity="0.6"/>
  <rect x="380" y="50" width="180" height="120" rx="8" fill="none" stroke="#D8B4FE" stroke-width="1" opacity="0.2"/>
  <!-- Pixel art game scene inside screen -->
  <rect x="420" y="100" width="8" height="8" fill="#4ade80" opacity="0.5"/>
  <rect x="428" y="100" width="8" height="8" fill="#4ade80" opacity="0.4"/>
  <rect x="436" y="96" width="8" height="12" fill="#F4A261" opacity="0.6"/>
  <rect x="444" y="104" width="8" height="8" fill="#4ade80" opacity="0.3"/>
  <rect x="460" y="92" width="8" height="16" fill="#E63946" opacity="0.5"/>
  <rect x="390" y="108" width="160" height="4" fill="#D8B4FE" opacity="0.15"/>
  <text x="470" y="66" text-anchor="middle" font-family="monospace" font-size="8" fill="#D8B4FE" opacity="0.4">PREVIEW</text>

  <!-- Controller icon (decorative, bottom-right) -->
  <rect x="440" y="290" width="100" height="60" rx="20" fill="#1A0B33" opacity="0.5"/>
  <rect x="440" y="290" width="100" height="60" rx="20" fill="none" stroke="#D8B4FE" stroke-width="1" opacity="0.2"/>
  <!-- D-pad -->
  <rect x="456" y="308" width="6" height="18" rx="2" fill="#D8B4FE" opacity="0.3"/>
  <rect x="450" y="314" width="18" height="6" rx="2" fill="#D8B4FE" opacity="0.3"/>
  <!-- Buttons -->
  <circle cx="510" cy="312" r="4" fill="#E63946" opacity="0.4"/>
  <circle cx="520" cy="320" r="4" fill="#4ade80" opacity="0.4"/>
  <circle cx="500" cy="322" r="4" fill="#D8B4FE" opacity="0.3"/>

  <!-- Game Designer node (top-left) -->
  <circle cx="120" cy="110" r="32" fill="#F4A261" opacity="0.95" filter="url(#wgGlow)"/>
  <circle cx="120" cy="110" r="19" fill="#E76F51"/>
  <!-- Game design icon: pencil + star -->
  <line x1="112" y1="118" x2="128" y2="102" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <polygon points="120,102 122,108 128,108 123,112 125,118 120,114 115,118 117,112 112,108 118,108" fill="white" opacity="0.0"/>
  <circle cx="128" cy="103" r="4" fill="white" opacity="0.7"/>

  <!-- Arrow: Game Designer → Builder -->
  <line x1="150" y1="120" x2="218" y2="175" stroke="#D8B4FE" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
  <polygon points="215,170 225,178 217,182" fill="#D8B4FE" opacity="0.5"/>
  <text x="178" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#D8B4FE" opacity="0.4">GDD</text>

  <!-- Builder node (center) -->
  <circle cx="260" cy="210" r="34" fill="url(#wgNode)" opacity="0.95" filter="url(#wgGlow)"/>
  <circle cx="260" cy="210" r="21" fill="#7B2FBE"/>
  <!-- Code brackets icon -->
  <text x="260" y="216" text-anchor="middle" font-family="monospace" font-size="16" fill="white" font-weight="bold" opacity="0.9">&lt;/&gt;</text>

  <!-- Arrow: Builder → Playtester -->
  <line x1="293" y1="218" x2="358" y2="248" stroke="#D8B4FE" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
  <polygon points="354,243 365,252 356,256" fill="#D8B4FE" opacity="0.5"/>
  <text x="335" y="235" text-anchor="middle" font-family="monospace" font-size="8" fill="#D8B4FE" opacity="0.4">build</text>

  <!-- Playtester node (bottom-right) -->
  <circle cx="400" cy="290" r="30" fill="url(#wgNode)" opacity="0.9" filter="url(#wgGlow)"/>
  <circle cx="400" cy="290" r="18" fill="#7B2FBE"/>
  <!-- Play button icon -->
  <polygon points="394,283 394,297 406,290" fill="white" opacity="0.9"/>

  <!-- Revision cycle arrow -->
  <path d="M 370 308 Q 320 350 268 240" fill="none" stroke="#D8B4FE" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.25"/>
  <polygon points="266,244 262,233 272,238" fill="#D8B4FE" opacity="0.25"/>
  <text x="298" y="350" text-anchor="middle" font-family="monospace" font-size="7" fill="#D8B4FE" opacity="0.3">revision</text>

  <!-- Node labels -->
  <text x="120" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" opacity="0.8">Game Designer</text>
  <text x="260" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Builder</text>
  <text x="400" y="336" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Playtester</text>

  <!-- Floating decorative dots -->
  <circle cx="50" cy="60" r="3" fill="#D8B4FE" opacity="0.3"/>
  <circle cx="555" cy="80" r="2.5" fill="#F4A261" opacity="0.25"/>
  <circle cx="65" cy="355" r="2" fill="#D8B4FE" opacity="0.2"/>
  <circle cx="45" cy="280" r="2.5" fill="#F4A261" opacity="0.2"/>
  <circle cx="200" cy="45" r="2" fill="#D8B4FE" opacity="0.3"/>
</svg>
