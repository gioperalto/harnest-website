<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#023E8A;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90E0EF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F4A261;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#E76F51;stop-opacity:0.1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="800" fill="url(#skyGrad)"/>

  <!-- Subtle atmospheric layers -->
  <ellipse cx="400" cy="200" rx="600" ry="300" fill="#0096C7" opacity="0.2" filter="url(#softBlur)"/>
  <ellipse cx="1500" cy="600" rx="500" ry="250" fill="#023E8A" opacity="0.3" filter="url(#softBlur)"/>

  <!-- Branching network / agent workflow lines -->
  <!-- Central trunk -->
  <line x1="960" y1="750" x2="960" y2="400" stroke="#ADE8F4" stroke-width="2" opacity="0.5"/>
  <!-- Branch left 1 -->
  <line x1="960" y1="500" x2="700" y2="300" stroke="#ADE8F4" stroke-width="1.5" opacity="0.4"/>
  <!-- Branch right 1 -->
  <line x1="960" y1="500" x2="1220" y2="300" stroke="#ADE8F4" stroke-width="1.5" opacity="0.4"/>
  <!-- Branch left 2 -->
  <line x1="700" y1="300" x2="550" y2="180" stroke="#ADE8F4" stroke-width="1" opacity="0.35"/>
  <line x1="700" y1="300" x2="750" y2="160" stroke="#ADE8F4" stroke-width="1" opacity="0.35"/>
  <!-- Branch right 2 -->
  <line x1="1220" y1="300" x2="1100" y2="160" stroke="#ADE8F4" stroke-width="1" opacity="0.35"/>
  <line x1="1220" y1="300" x2="1350" y2="170" stroke="#ADE8F4" stroke-width="1" opacity="0.35"/>

  <!-- Node dots on branches -->
  <circle cx="960" cy="400" r="8" fill="#F4A261" opacity="0.9"/>
  <circle cx="960" cy="500" r="6" fill="#00B4D8" opacity="0.8"/>
  <circle cx="700" cy="300" r="7" fill="#F4A261" opacity="0.8"/>
  <circle cx="1220" cy="300" r="7" fill="#F4A261" opacity="0.8"/>
  <circle cx="550" cy="180" r="5" fill="#ADE8F4" opacity="0.7"/>
  <circle cx="750" cy="160" r="5" fill="#ADE8F4" opacity="0.7"/>
  <circle cx="1100" cy="160" r="5" fill="#ADE8F4" opacity="0.7"/>
  <circle cx="1350" cy="170" r="5" fill="#ADE8F4" opacity="0.7"/>

  <!-- Extended network left side -->
  <line x1="400" y1="700" x2="300" y2="450" stroke="#ADE8F4" stroke-width="1.5" opacity="0.3"/>
  <line x1="300" y1="450" x2="200" y2="280" stroke="#ADE8F4" stroke-width="1" opacity="0.25"/>
  <line x1="300" y1="450" x2="380" y2="250" stroke="#ADE8F4" stroke-width="1" opacity="0.25"/>
  <circle cx="300" cy="450" r="6" fill="#00B4D8" opacity="0.6"/>
  <circle cx="200" cy="280" r="4" fill="#ADE8F4" opacity="0.5"/>
  <circle cx="380" cy="250" r="4" fill="#ADE8F4" opacity="0.5"/>

  <!-- Extended network right side -->
  <line x1="1520" y1="700" x2="1620" y2="450" stroke="#ADE8F4" stroke-width="1.5" opacity="0.3"/>
  <line x1="1620" y1="450" x2="1720" y2="280" stroke="#ADE8F4" stroke-width="1" opacity="0.25"/>
  <line x1="1620" y1="450" x2="1540" y2="250" stroke="#ADE8F4" stroke-width="1" opacity="0.25"/>
  <circle cx="1620" cy="450" r="6" fill="#00B4D8" opacity="0.6"/>
  <circle cx="1720" cy="280" r="4" fill="#ADE8F4" opacity="0.5"/>
  <circle cx="1540" cy="250" r="4" fill="#ADE8F4" opacity="0.5"/>

  <!-- Abstract bird/wing shapes (V-shapes in flight) -->
  <!-- Bird flock 1 - upper left area -->
  <path d="M 180 150 Q 200 135 220 150" stroke="#F4A261" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 220 150 Q 240 135 260 150" stroke="#F4A261" stroke-width="2.5" fill="none" opacity="0.7"/>

  <path d="M 140 180 Q 165 162 190 180" stroke="#F4A261" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 190 180 Q 215 162 240 180" stroke="#F4A261" stroke-width="2" fill="none" opacity="0.5"/>

  <path d="M 200 210 Q 220 196 240 210" stroke="#F4A261" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Bird flock 2 - upper right area -->
  <path d="M 1650 120 Q 1670 105 1690 120" stroke="#ADE8F4" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M 1690 120 Q 1710 105 1730 120" stroke="#ADE8F4" stroke-width="2.5" fill="none" opacity="0.6"/>

  <path d="M 1620 155 Q 1645 138 1670 155" stroke="#ADE8F4" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M 1670 155 Q 1695 138 1720 155" stroke="#ADE8F4" stroke-width="2" fill="none" opacity="0.45"/>

  <!-- Bird flock 3 - mid area -->
  <path d="M 800 120 Q 815 108 830 120" stroke="#CAF0F8" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 830 120 Q 845 108 860 120" stroke="#CAF0F8" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 785 145 Q 800 132 815 145" stroke="#CAF0F8" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Geometric accent shapes -->
  <polygon points="100,600 130,550 160,600" fill="#F4A261" opacity="0.15"/>
  <polygon points="1800,200 1830,150 1860,200" fill="#F4A261" opacity="0.12"/>
  <polygon points="1750,400 1775,360 1800,400" fill="#ADE8F4" opacity="0.1"/>
  <polygon points="80,350 105,310 130,350" fill="#ADE8F4" opacity="0.1"/>

  <!-- Gold warm glow in upper right -->
  <radialGradient id="goldGlow" cx="75%" cy="20%" r="30%">
    <stop offset="0%" style="stop-color:#F4A261;stop-opacity:0.15"/>
    <stop offset="100%" style="stop-color:#F4A261;stop-opacity:0"/>
  </radialGradient>
  <rect width="1920" height="800" fill="url(#goldGlow)"/>

  <!-- Light shimmer effect bottom -->
  <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#ADE8F4;stop-opacity:0.05"/>
  </linearGradient>
  <rect width="1920" height="800" fill="url(#shimmer)"/>
</svg>
