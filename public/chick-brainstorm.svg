<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0533;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2D1B69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bsNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
    <filter id="bsGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="600" height="400" rx="16" fill="url(#bsBg)"/>

  <!-- Subtle radial idea bursts -->
  <circle cx="300" cy="200" r="180" fill="none" stroke="#C4B5FD" stroke-width="0.5" opacity="0.08"/>
  <circle cx="300" cy="200" r="140" fill="none" stroke="#C4B5FD" stroke-width="0.5" opacity="0.06"/>
  <circle cx="300" cy="200" r="100" fill="none" stroke="#C4B5FD" stroke-width="0.5" opacity="0.04"/>

  <!-- Facilitator (left) -->
  <circle cx="90" cy="180" r="32" fill="#F4A261" opacity="0.95" filter="url(#bsGlow)"/>
  <circle cx="90" cy="180" r="20" fill="#E76F51"/>
  <text x="90" y="175" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">FACI</text>
  <text x="90" y="186" text-anchor="middle" font-family="monospace" font-size="7" fill="white" opacity="0.8">LITOR</text>

  <!-- Arrow: Facilitator → Explorer -->
  <line x1="122" y1="168" x2="188" y2="120" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="185,115 195,120 187,126" fill="#C4B5FD" opacity="0.6"/>

  <!-- Arrow: Facilitator → Provocateur -->
  <line x1="122" y1="192" x2="188" y2="240" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="185,234 195,240 187,246" fill="#C4B5FD" opacity="0.6"/>

  <!-- Label: brief -->
  <text x="155" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4B5FD" opacity="0.5">brief</text>

  <!-- Explorer (top-center) -->
  <circle cx="230" cy="110" r="28" fill="url(#bsNode)" opacity="0.9"/>
  <circle cx="230" cy="110" r="17" fill="#6C63FF"/>
  <text x="230" y="107" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">EXP</text>
  <text x="230" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="white" opacity="0.8">LORER</text>

  <!-- Lightbulb sparks around Explorer -->
  <circle cx="255" cy="88" r="3" fill="#F4A261" opacity="0.7"/>
  <circle cx="262" cy="100" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="205" cy="92" r="2.5" fill="#F4A261" opacity="0.6"/>

  <!-- Provocateur (bottom-center) -->
  <circle cx="230" cy="250" r="28" fill="url(#bsNode)" opacity="0.9"/>
  <circle cx="230" cy="250" r="17" fill="#6C63FF"/>
  <text x="230" y="247" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="bold">PROV</text>
  <text x="230" y="258" text-anchor="middle" font-family="monospace" font-size="7" fill="white" opacity="0.8">OCAT</text>

  <!-- Lightning bolt sparks around Provocateur -->
  <circle cx="257" cy="265" r="3" fill="#E76F51" opacity="0.7"/>
  <circle cx="205" cy="268" r="2.5" fill="#F4A261" opacity="0.5"/>
  <circle cx="250" cy="232" r="2" fill="#C4B5FD" opacity="0.6"/>

  <!-- Parallel indicator -->
  <rect x="210" y="155" width="40" height="50" rx="6" fill="none" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="3 3" opacity="0.2"/>

  <!-- Arrow: Explorer → Synthesizer -->
  <line x1="258" y1="118" x2="370" y2="170" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="367,165 377,170 369,176" fill="#C4B5FD" opacity="0.6"/>

  <!-- Arrow: Provocateur → Synthesizer -->
  <line x1="258" y1="242" x2="370" y2="190" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="367,184 377,190 369,196" fill="#C4B5FD" opacity="0.6"/>

  <!-- Label: ideas -->
  <text x="325" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4B5FD" opacity="0.5">ideas</text>

  <!-- Synthesizer (right) -->
  <circle cx="410" cy="180" r="35" fill="#F4A261" opacity="0.95" filter="url(#bsGlow)"/>
  <circle cx="410" cy="180" r="22" fill="#E76F51"/>
  <!-- Merge icon: two lines converging -->
  <polyline points="400,172 410,182 420,172" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
  <line x1="410" y1="182" x2="410" y2="192" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>

  <!-- Arrow: Synthesizer → Output -->
  <line x1="445" y1="180" x2="478" y2="180" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="5 3" opacity="0.6"/>
  <polygon points="475,175 485,180 475,185" fill="#C4B5FD" opacity="0.6"/>

  <!-- Output document -->
  <rect x="490" y="158" width="60" height="44" rx="8" fill="#1A0533" opacity="0.85"/>
  <line x1="502" y1="172" x2="538" y2="172" stroke="#C4B5FD" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="502" y1="180" x2="530" y2="180" stroke="#6C63FF" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="502" y1="188" x2="534" y2="188" stroke="#C4B5FD" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- Labels below nodes -->
  <text x="90" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Facilitator</text>
  <text x="230" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Explorer</text>
  <text x="230" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Provocateur</text>
  <text x="410" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Synthesizer</text>

  <!-- Floating decorative sparks -->
  <circle cx="50" cy="60" r="3" fill="#C4B5FD" opacity="0.3"/>
  <circle cx="540" cy="80" r="2.5" fill="#F4A261" opacity="0.25"/>
  <circle cx="70" cy="340" r="2" fill="#F4A261" opacity="0.2"/>
  <circle cx="530" cy="330" r="3" fill="#C4B5FD" opacity="0.2"/>
  <circle cx="350" cy="50" r="2" fill="#F4A261" opacity="0.3"/>
  <circle cx="460" cy="320" r="2.5" fill="#C4B5FD" opacity="0.25"/>
</svg>