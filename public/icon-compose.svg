<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>
  </defs>
  <!-- Composable team — interconnected nodes -->
  <!-- Central node -->
  <circle cx="100" cy="100" r="22" fill="url(#g1)" opacity="0.95"/>
  <circle cx="100" cy="100" r="10" fill="white" opacity="0.9"/>
  <!-- Orbiting nodes -->
  <circle cx="100" cy="45" r="15" fill="#F4A261" opacity="0.9"/>
  <circle cx="100" cy="45" r="7" fill="white" opacity="0.8"/>
  <circle cx="148" cy="128" r="15" fill="#F4A261" opacity="0.9"/>
  <circle cx="148" cy="128" r="7" fill="white" opacity="0.8"/>
  <circle cx="52" cy="128" r="15" fill="#F4A261" opacity="0.9"/>
  <circle cx="52" cy="128" r="7" fill="white" opacity="0.8"/>
  <!-- Connecting lines -->
  <line x1="100" y1="78" x2="100" y2="60" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <line x1="118" y1="110" x2="135" y2="118" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <line x1="82" y1="110" x2="65" y2="118" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <!-- Outer ring dashes -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#00B4D8" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
</svg>
