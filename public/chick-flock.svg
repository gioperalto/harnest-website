<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="flBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D0B0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E63946;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBABA"/>
      <stop offset="100%" style="stop-color:#E63946"/>
    </linearGradient>
    <filter id="flGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="600" height="400" rx="16" fill="url(#flBg)"/>

  <!-- Subtle chain-link pattern in background -->
  <circle cx="150" cy="200" r="120" fill="none" stroke="#FFBABA" stroke-width="0.5" opacity="0.06"/>
  <circle cx="450" cy="200" r="120" fill="none" stroke="#FFBABA" stroke-width="0.5" opacity="0.06"/>
  <circle cx="300" cy="200" r="80" fill="none" stroke="#FFBABA" stroke-width="0.5" opacity="0.04"/>

  <!-- Chick icons floating as pipeline inputs (top) -->
  <rect x="60" y="55" width="36" height="28" rx="6" fill="#FFBABA" opacity="0.12"/>
  <text x="78" y="74" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFBABA" opacity="0.5">chick</text>
  <rect x="108" y="55" width="36" height="28" rx="6" fill="#FFBABA" opacity="0.08"/>
  <text x="126" y="74" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFBABA" opacity="0.35">chick</text>
  <rect x="156" y="55" width="36" height="28" rx="6" fill="#FFBABA" opacity="0.05"/>
  <text x="174" y="74" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFBABA" opacity="0.25">chick</text>

  <!-- Arrow from chicks down to Interviewer -->
  <line x1="126" y1="83" x2="148" y2="138" stroke="#FFBABA" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Interviewer node (left-center) -->
  <circle cx="160" cy="180" r="36" fill="#F4A261" opacity="0.95" filter="url(#flGlow)"/>
  <circle cx="160" cy="180" r="22" fill="#E76F51"/>
  <!-- Microphone/interview icon -->
  <rect x="155" y="168" width="10" height="14" rx="5" fill="white" opacity="0.9"/>
  <path d="M 150 178 Q 150 192 160 192 Q 170 192 170 178" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="160" y1="192" x2="160" y2="198" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Arrow: Interviewer → Composer -->
  <line x1="198" y1="180" x2="340" y2="180" stroke="#FFBABA" stroke-width="2.5" opacity="0.55"/>
  <polygon points="337,175 350,180 337,185" fill="#FFBABA" opacity="0.55"/>
  <text x="269" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFBABA" opacity="0.45">brief</text>

  <!-- Composer node (right-center) -->
  <circle cx="400" cy="180" r="36" fill="url(#flNode)" opacity="0.95" filter="url(#flGlow)"/>
  <circle cx="400" cy="180" r="22" fill="#E63946"/>
  <!-- Compose/document icon -->
  <rect x="390" y="170" width="20" height="18" rx="3" fill="white" opacity="0.9"/>
  <line x1="394" y1="176" x2="406" y2="176" stroke="#E63946" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="394" y1="180" x2="406" y2="180" stroke="#E63946" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="394" y1="184" x2="402" y2="184" stroke="#E63946" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Arrow: Composer → flock.yaml output -->
  <line x1="438" y1="180" x2="476" y2="180" stroke="#FFBABA" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
  <polygon points="473,175 483,180 473,185" fill="#FFBABA" opacity="0.5"/>

  <!-- flock.yaml output document -->
  <rect x="488" y="156" width="68" height="48" rx="8" fill="#3D0B0B" opacity="0.9"/>
  <rect x="488" y="156" width="68" height="48" rx="8" fill="url(#flNode)" opacity="0.1"/>
  <text x="522" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFBABA" opacity="0.7">flock</text>
  <text x="522" y="184" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFBABA" opacity="0.55">.yaml</text>
  <line x1="500" y1="192" x2="544" y2="192" stroke="#FFBABA" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Pipeline chain links decoration (bottom) -->
  <g opacity="0.18" stroke="#FFBABA" stroke-width="2" fill="none">
    <ellipse cx="230" cy="310" rx="24" ry="14" transform="rotate(-30 230 310)"/>
    <ellipse cx="260" cy="308" rx="24" ry="14" transform="rotate(-30 260 308)"/>
    <ellipse cx="290" cy="306" rx="24" ry="14" transform="rotate(-30 290 306)"/>
    <ellipse cx="320" cy="304" rx="24" ry="14" transform="rotate(-30 320 304)"/>
    <ellipse cx="350" cy="302" rx="24" ry="14" transform="rotate(-30 350 302)"/>
  </g>

  <!-- Node labels -->
  <text x="160" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Interviewer</text>
  <text x="400" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Composer</text>
  <text x="522" y="216" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" opacity="0.7">Output</text>

  <!-- Floating decorative dots -->
  <circle cx="50" cy="60" r="3" fill="#FFBABA" opacity="0.3"/>
  <circle cx="540" cy="80" r="2.5" fill="#F4A261" opacity="0.25"/>
  <circle cx="70" cy="350" r="2" fill="#FFBABA" opacity="0.2"/>
  <circle cx="530" cy="340" r="3" fill="#F4A261" opacity="0.2"/>
  <circle cx="350" cy="50" r="2" fill="#FFBABA" opacity="0.3"/>
</svg>
