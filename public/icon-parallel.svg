<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077B6"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#00B4D8" opacity="0.9"/>
    </marker>
  </defs>
  <!-- Parallel execution — split and merge -->
  <!-- Input -->
  <circle cx="40" cy="100" r="16" fill="url(#g4)" opacity="0.9"/>
  <circle cx="40" cy="100" r="7" fill="white" opacity="0.8"/>
  <!-- Split lines -->
  <line x1="56" y1="100" x2="75" y2="65" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <line x1="56" y1="100" x2="75" y2="100" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <line x1="56" y1="100" x2="75" y2="135" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <!-- Parallel nodes -->
  <rect x="75" y="50" width="50" height="28" rx="8" fill="#F4A261" opacity="0.9"/>
  <rect x="75" y="86" width="50" height="28" rx="8" fill="#F4A261" opacity="0.9"/>
  <rect x="75" y="122" width="50" height="28" rx="8" fill="#F4A261" opacity="0.9"/>
  <!-- Merge lines -->
  <line x1="125" y1="64" x2="144" y2="100" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <line x1="125" y1="100" x2="144" y2="100" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <line x1="125" y1="136" x2="144" y2="100" stroke="#0077B6" stroke-width="2.5" opacity="0.7"/>
  <!-- Output -->
  <circle cx="160" cy="100" r="16" fill="url(#g4)" opacity="0.9"/>
  <circle cx="160" cy="100" r="7" fill="white" opacity="0.8"/>
</svg>
