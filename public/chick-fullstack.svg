<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="fsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#023E8A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fsNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ADE8F4"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="600" height="400" rx="16" fill="url(#fsBg)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.07" stroke="#ADE8F4" stroke-width="1">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
  </g>

  <!-- Architecture diagram: layered fullstack nodes -->
  <!-- Top layer: Architect -->
  <circle cx="300" cy="80" r="30" fill="#F4A261" opacity="0.9" filter="url(#glow2)"/>
  <circle cx="300" cy="80" r="18" fill="#E76F51"/>
  <text x="300" y="86" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">ARCH</text>

  <!-- Second layer: Sr Engineer -->
  <line x1="300" y1="110" x2="300" y2="140" stroke="#ADE8F4" stroke-width="2" opacity="0.6"/>
  <circle cx="300" cy="160" r="25" fill="url(#fsNode)" opacity="0.9"/>
  <circle cx="300" cy="160" r="15" fill="#0077B6"/>
  <text x="300" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">SR</text>

  <!-- Third layer: Jr Engineers -->
  <line x1="285" y1="183" x2="200" y2="230" stroke="#ADE8F4" stroke-width="2" opacity="0.5"/>
  <line x1="315" y1="183" x2="400" y2="230" stroke="#ADE8F4" stroke-width="2" opacity="0.5"/>

  <circle cx="200" cy="250" r="22" fill="url(#fsNode)" opacity="0.85"/>
  <circle cx="200" cy="250" r="13" fill="#00B4D8"/>
  <text x="200" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">JR</text>

  <circle cx="400" cy="250" r="22" fill="url(#fsNode)" opacity="0.85"/>
  <circle cx="400" cy="250" r="13" fill="#00B4D8"/>
  <text x="400" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">JR</text>

  <!-- Fourth layer: Test Engineer -->
  <line x1="200" y1="272" x2="300" y2="320" stroke="#ADE8F4" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="272" x2="300" y2="320" stroke="#ADE8F4" stroke-width="2" opacity="0.5"/>
  <circle cx="300" cy="340" r="22" fill="#F4A261" opacity="0.9"/>
  <circle cx="300" cy="340" r="13" fill="#E76F51"/>
  <text x="300" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">TEST</text>

  <!-- Floating mini dots -->
  <circle cx="80" cy="100" r="3" fill="#ADE8F4" opacity="0.4"/>
  <circle cx="520" cy="150" r="3" fill="#ADE8F4" opacity="0.4"/>
  <circle cx="60" cy="300" r="2" fill="#F4A261" opacity="0.3"/>
  <circle cx="540" cy="330" r="2" fill="#F4A261" opacity="0.3"/>
</svg>
