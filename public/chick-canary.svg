<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="cnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3D36;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A6B5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cnNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A7F3D0"/>
      <stop offset="100%" style="stop-color:#2A9D8F"/>
    </linearGradient>
    <filter id="cnGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="600" height="400" rx="16" fill="url(#cnBg)"/>

  <!-- Telemetry pulse line across the background -->
  <path d="M 0 300 L 80 300 L 100 270 L 120 330 L 140 280 L 160 310 L 180 290 L 200 300 L 300 300 L 320 260 L 340 340 L 360 275 L 380 315 L 400 285 L 420 300 L 600 300" stroke="#A7F3D0" stroke-width="1.5" fill="none" opacity="0.12"/>
  <path d="M 0 320 L 100 320 L 115 305 L 130 335 L 145 312 L 160 325 L 180 315 L 200 320 L 350 320 L 365 305 L 380 335 L 395 312 L 410 325 L 430 315 L 450 320 L 600 320" stroke="#A7F3D0" stroke-width="1" fill="none" opacity="0.07"/>

  <!-- Observer (left) — starts first, monitors telemetry -->
  <circle cx="140" cy="160" r="34" fill="url(#cnNode)" opacity="0.9" filter="url(#cnGlow)"/>
  <circle cx="140" cy="160" r="21" fill="#1A6B5E"/>
  <!-- Eye/monitoring icon -->
  <ellipse cx="140" cy="158" rx="12" ry="7" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <circle cx="140" cy="158" r="3.5" fill="white" opacity="0.9"/>

  <!-- Signal waves from Observer -->
  <path d="M 165 145 Q 180 140 180 155" fill="none" stroke="#A7F3D0" stroke-width="1.5" opacity="0.4"/>
  <path d="M 170 140 Q 190 133 190 153" fill="none" stroke="#A7F3D0" stroke-width="1.5" opacity="0.3"/>
  <path d="M 175 135 Q 200 126 200 151" fill="none" stroke="#A7F3D0" stroke-width="1.5" opacity="0.2"/>

  <!-- Validator (right) — runs in parallel -->
  <circle cx="380" cy="160" r="34" fill="#F4A261" opacity="0.95" filter="url(#cnGlow)"/>
  <circle cx="380" cy="160" r="21" fill="#E76F51"/>
  <!-- Checklist icon -->
  <polyline points="371,152 375,156 383,147" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
  <line x1="371" y1="164" x2="389" y2="164" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="371" y1="172" x2="385" y2="172" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Parallel execution bracket -->
  <rect x="110" y="110" width="300" height="100" rx="12" fill="none" stroke="#A7F3D0" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <text x="260" y="106" text-anchor="middle" font-family="monospace" font-size="8" fill="#A7F3D0" opacity="0.35">parallel</text>

  <!-- Connection lines to Report -->
  <line x1="170" y1="185" x2="260" y2="260" stroke="#A7F3D0" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="350" y1="185" x2="270" y2="260" stroke="#A7F3D0" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>

  <!-- Labels -->
  <text x="210" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#A7F3D0" opacity="0.5">health</text>
  <text x="320" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#A7F3D0" opacity="0.5">results</text>

  <!-- Report node (bottom-center) -->
  <rect x="235" y="265" width="70" height="50" rx="10" fill="#0B3D36" opacity="0.9"/>
  <rect x="235" y="265" width="70" height="50" rx="10" fill="url(#cnNode)" opacity="0.15"/>
  <!-- Document lines -->
  <line x1="250" y1="280" x2="290" y2="280" stroke="#A7F3D0" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="250" y1="288" x2="285" y2="288" stroke="#2A9D8F" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="250" y1="296" x2="288" y2="296" stroke="#A7F3D0" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="250" y1="304" x2="278" y2="304" stroke="#2A9D8F" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Pass/fail indicator on report -->
  <circle cx="295" cy="303" r="5" fill="#4ade80" opacity="0.8"/>
  <polyline points="292,303 294,305 299,300" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Node labels -->
  <text x="140" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Observer</text>
  <text x="380" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Validator</text>
  <text x="270" y="335" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" opacity="0.8">Report</text>

  <!-- Floating decorative dots -->
  <circle cx="50" cy="60" r="3" fill="#A7F3D0" opacity="0.3"/>
  <circle cx="540" cy="70" r="2.5" fill="#F4A261" opacity="0.25"/>
  <circle cx="70" cy="350" r="2" fill="#A7F3D0" opacity="0.2"/>
  <circle cx="530" cy="350" r="2.5" fill="#F4A261" opacity="0.2"/>
  <circle cx="480" cy="100" r="2" fill="#A7F3D0" opacity="0.3"/>
</svg>